<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Synapse</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#06060f; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      height:100vh; font-family:'Courier New',monospace;
      color:#aabbff; overflow:hidden; user-select:none;
    }

    #title { font-size:12px; letter-spacing:4px; color:#4455cc; margin-bottom:6px; }
    #status { font-size:9px; color:#334; margin-bottom:8px; letter-spacing:1px; min-height:12px; }

    #game-wrap {
      position: relative;
      width: 800px;
      height: 600px;
      border: 2px solid #1a1a3a;
      box-shadow: 0 0 40px #1a1a3a;
      flex-shrink: 0;
    }

    /* Phaser injects a canvas — make it fill the wrapper exactly */
    #game { width: 800px; height: 600px; display: block; }
    #game canvas { display: block; width: 800px !important; height: 600px !important; }

    /* ── HUD bar ── */
    #hud {
      position:absolute; top:0; left:0; right:0;
      display:flex; justify-content:space-between; align-items:center;
      padding:4px 10px; background:#04040ccc;
      border-bottom:1px solid #1a1a2a; z-index:20; pointer-events:none;
    }
    #hud-name  { font-size:8px; color:#aabbff; }
    #hud-coins { font-size:8px; color:#ffcc44; }
    #hud-rep   { font-size:8px; color:#44ff88; }
    #hud-job   { font-size:7px; color:#aa66ff; max-width:240px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    #player-count { font-size:8px; color:#44ff88; }

    /* ── Chat ── */
    #chat-panel {
      position:absolute; bottom:0; left:0; width:250px;
      max-height:140px; background:#04040ccc;
      border-right:1px solid #1a1a2a; border-top:1px solid #1a1a2a;
      display:flex; flex-direction:column; z-index:10;
    }
    #chat-log { flex:1; overflow-y:auto; padding:5px 7px; font-size:9px; line-height:1.6; }
    #chat-log .cn { color:#4fc3f7; } #chat-log .ct { color:#ccdde8; }
    #chat-log .cs { color:#334; font-style:italic; }
    #chat-log .cg { color:#aa66ff; font-style:italic; }
    #chat-input-row { display:flex; border-top:1px solid #1a1a2a; }
    #chat-input {
      flex:1; background:#0a0a14; border:none; color:#ccdde8;
      font-size:9px; padding:5px 7px; font-family:'Courier New',monospace; outline:none;
    }
    #chat-send {
      background:#1a1a2a; border:none; border-left:1px solid #1a1a2a;
      color:#4455cc; padding:0 8px; cursor:pointer; font-size:9px;
    }
    #chat-send:hover { background:#242444; }

    /* ── Interact prompt ── */
    #interact-prompt {
      position:absolute; bottom:145px; left:50%;
      transform:translateX(-50%);
      background:#0a0a18; border:1px solid #4455cc;
      color:#aabbff; font-size:8px; padding:3px 10px;
      z-index:15; display:none; pointer-events:none;
      letter-spacing:1px;
    }

    /* ── NPC dialogue box ── */
    #dialogue-box {
      position:absolute; bottom:145px; left:50%; transform:translateX(-50%);
      background:#080810; border:2px solid #aa66ff;
      padding:12px 16px; min-width:340px; max-width:500px;
      z-index:30; display:none; font-size:9px;
    }
    #dialogue-npc  { color:#aa66ff; font-size:10px; margin-bottom:6px; letter-spacing:1px; }
    #dialogue-text { color:#ccdde8; line-height:1.6; margin-bottom:8px; }
    #dialogue-btns { display:flex; gap:6px; flex-wrap:wrap; }
    .dlg-btn {
      background:#1a1a2a; border:1px solid #3344aa; color:#aabbff;
      padding:3px 10px; font-family:'Courier New',monospace; font-size:8px;
      cursor:pointer;
    }
    .dlg-btn:hover { background:#242444; border-color:#aa66ff; color:#fff; }
    .dlg-btn.shop  { border-color:#ffcc44; color:#ffcc44; }
    .dlg-btn.job   { border-color:#44ff88; color:#44ff88; }
    .dlg-btn.close { border-color:#334; color:#556677; margin-left:auto; }

    /* ── Shop panel ── */
    #shop-panel {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      background:#080810; border:2px solid #ffcc44;
      padding:14px 18px; min-width:300px; z-index:40; display:none;
    }
    #shop-title  { color:#ffcc44; font-size:10px; margin-bottom:4px; letter-spacing:2px; }
    #shop-coins  { color:#ffcc44; font-size:8px; margin-bottom:10px; }
    #shop-items  { display:flex; flex-direction:column; gap:6px; }
    .shop-item   { display:flex; justify-content:space-between; align-items:center;
                   background:#0a0a18; border:1px solid #2a2a3a; padding:5px 9px; }
    .shop-item-name { color:#ccdde8; font-size:8px; }
    .shop-item-price { color:#ffcc44; font-size:8px; margin-right:8px; }
    .shop-buy { background:#1a2a1a; border:1px solid #44ff88; color:#44ff88;
                font-family:'Courier New',monospace; font-size:8px; padding:2px 8px; cursor:pointer; }
    .shop-buy:hover  { background:#243424; }
    .shop-buy:disabled { opacity:0.3; cursor:default; }
    #shop-close { margin-top:10px; background:none; border:1px solid #334;
                  color:#556677; font-family:'Courier New',monospace;
                  font-size:8px; padding:3px 10px; cursor:pointer; width:100%; }
    #shop-close:hover { border-color:#556677; color:#aabbff; }

    /* ── Job panel ── */
    #job-panel {
      position:absolute; top:36px; right:8px;
      background:#080810; border:1px solid #aa66ff;
      padding:8px 12px; min-width:220px; z-index:15; display:none;
      font-size:8px;
    }
    #job-title   { color:#aa66ff; margin-bottom:4px; letter-spacing:1px; }
    #job-label   { color:#ccdde8; margin-bottom:3px; line-height:1.5; }
    #job-desc    { color:#556677; font-size:7px; line-height:1.5; }
    #job-timer   { color:#ffcc44; font-size:7px; margin-top:4px; min-height:10px; }

    /* ── Floating reward popup ── */
    .float-popup {
      position:absolute; pointer-events:none; z-index:50;
      font-size:11px; font-weight:bold; font-family:'Courier New',monospace;
      text-shadow:0 0 6px currentColor;
      animation: floatUp 1.8s ease-out forwards;
    }
    @keyframes floatUp {
      0%   { opacity:1;   transform:translateY(0); }
      100% { opacity:0;   transform:translateY(-60px); }
    }

    #controls { margin-top:6px; font-size:8px; color:#223; letter-spacing:1px; }
  </style>
</head>
<body>
  <div id="title">⬛ PIXEL SYNAPSE</div>
  <div id="status">Connecting…</div>

  <div id="game-wrap">
    <div id="game"></div>

    <!-- HUD -->
    <div id="hud">
      <span id="hud-name">—</span>
      <span id="hud-coins">◈ 50 coins</span>
      <span id="hud-rep">★ 0 rep</span>
      <span id="hud-job">No active job</span>
      <span id="player-count">● 1 online</span>
    </div>

    <!-- Interact prompt -->
    <div id="interact-prompt">[E] Talk to <span id="prompt-npc-name">NPC</span></div>

    <!-- NPC dialogue -->
    <div id="dialogue-box">
      <div id="dialogue-npc"></div>
      <div id="dialogue-text"></div>
      <div id="dialogue-btns"></div>
    </div>

    <!-- Shop panel -->
    <div id="shop-panel">
      <div id="shop-title">⚑ SHOP</div>
      <div id="shop-coins"></div>
      <div id="shop-items"></div>
      <button id="shop-close" onclick="closeShop()">✕ Close</button>
    </div>

    <!-- Active job panel -->
    <div id="job-panel">
      <div id="job-title">▸ ACTIVE JOB</div>
      <div id="job-label"></div>
      <div id="job-desc"></div>
      <div id="job-timer"></div>
    </div>

    <!-- Chat -->
    <div id="chat-panel">
      <div id="chat-log"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Enter to chat…" maxlength="120" autocomplete="off">
        <button id="chat-send">▶</button>
      </div>
    </div>
  </div>

  <div id="controls">WASD/ARROWS move · E interact · ESC close</div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
